# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - Minibank

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🛠️ Local Build Section (Optional)
      # The following section in your workflow is designed to catch build issues early on the client side, before deployment. This can be helpful for debugging and validation. However, if this step significantly increases deployment time and early detection is not critical for your workflow, you may remove this section to streamline the deployment process.
      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
                
      # By default, when you enable GitHub CI/CD integration through the Azure portal, the platform automatically sets the SCM_DO_BUILD_DURING_DEPLOYMENT application setting to true. This triggers the use of Oryx, a build engine that handles application compilation and dependency installation (e.g., pip install) directly on the platform during deployment. Hence, we exclude the antenv virtual environment directory from the deployment artifact to reduce the payload size. 
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  # ─── Unit Tests (no DB needed) ───
  test-unit:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/test_basic.py -v

  # ─── DB Connection & Integration Tests ───
  test-db:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    env:
      SQL_SERVER: ${{ secrets.SQL_SERVER }}
      SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
      SQL_USER: ${{ secrets.SQL_USER }}
      SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ODBC Driver 18
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test DB connection
        run: |
          python -c "
          import pyodbc, os
          conn_str = (
              'DRIVER={ODBC Driver 18 for SQL Server};'
              f'SERVER={os.environ[\"SQL_SERVER\"]};'
              f'DATABASE={os.environ[\"SQL_DATABASE\"]};'
              f'UID={os.environ[\"SQL_USER\"]};'
              f'PWD={os.environ[\"SQL_PASSWORD\"]};'
              'Encrypt=yes;TrustServerCertificate=no;'
          )
          conn = pyodbc.connect(conn_str, timeout=15)
          cursor = conn.cursor()
          cursor.execute('SELECT 1')
          assert cursor.fetchone()[0] == 1
          print('✅ DB connection successful')
          conn.close()
          "

      - name: Verify DB tables exist
        run: |
          python -c "
          import pyodbc, os
          conn_str = (
              'DRIVER={ODBC Driver 18 for SQL Server};'
              f'SERVER={os.environ[\"SQL_SERVER\"]};'
              f'DATABASE={os.environ[\"SQL_DATABASE\"]};'
              f'UID={os.environ[\"SQL_USER\"]};'
              f'PWD={os.environ[\"SQL_PASSWORD\"]};'
              'Encrypt=yes;TrustServerCertificate=no;'
          )
          conn = pyodbc.connect(conn_str, timeout=15)
          cursor = conn.cursor()

          # Check users table
          cursor.execute(\"SELECT TABLE_NAME FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_NAME='users'\")
          assert cursor.fetchone() is not None, '❌ users table not found'
          print('✅ users table exists')

          # Check transactions table
          cursor.execute(\"SELECT TABLE_NAME FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_NAME='transactions'\")
          assert cursor.fetchone() is not None, '❌ transactions table not found'
          print('✅ transactions table exists')

          conn.close()
          "

      - name: Run integration tests
        run: |
          python -m pytest tests/test_db.py -v

  deploy:
    runs-on: ubuntu-latest
    needs: [test-unit, test-db]
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'Minibank'
          slot-name: 'Production'
          startup-command: 'gunicorn --bind=0.0.0.0 --timeout 600 app:app'
